<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - IEMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        .admin-login-body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0F172A, #1E3A5F);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background-color: white;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }
        .login-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #0F172A;
            text-align: center;
            margin-bottom: 32px;
        }
    </style>
</head>
<body class="admin-login-body">
    <div class="login-card">
        <h2 class="login-title">IEMS Admin Login</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Login</button>
        </form>
        <div class="text-center mt-3" style="display: flex; flex-direction: column; gap: 8px;">
            <a href="{{ url_for('access_request.apply') }}" class="text-primary text-sm fw-semibold" style="text-decoration: none;">Apply for Authority Access</a>
            <a href="{{ url_for('public.home') }}" class="text-muted text-sm" style="text-decoration: none;">Return to Home</a>
        </div>
    </div>
</body>
</html>
