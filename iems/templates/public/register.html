{% extends "base.html" %}

{% block title %}Register - {{ item.title }}{% endblock %}

{% block content %}
<section class="section bg-white">
    <div class="container" style="max-width: 640px;">
        <div class="card" style="border-top: 4px solid var(--primary); padding: 2rem;">
            <div class="mb-4">
                <div class="badge badge-primary mb-2" style="text-transform: uppercase;">{{ item_type | title }} Registration</div>
                <h2 class="mb-1">{{ item.title }}</h2>
                <p class="text-sm text-secondary">Fill out the form below to register. All fields marked with * are required.</p>
            </div>
            
            <form method="POST" action="{{ url_for('registration.register', item_type=item_type, item_id=item.id) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="form-group mb-3">
                    <label class="form-label fw-semibold">Full Name *</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter your full name" required style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                </div>
                
                <div class="d-grid gap-3 mb-3" style="grid-template-columns: 1fr 1fr;">
                    <div class="form-group">
                        <label class="form-label fw-semibold">Email Address *</label>
                        <input type="email" name="email" class="form-control" placeholder="you@example.com" required style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                    </div>
                    <div class="form-group">
                        <label class="form-label fw-semibold">Phone Number</label>
                        <input type="tel" name="phone" class="form-control" placeholder="+91 98765 43210" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                    </div>
                </div>
                
                <div class="d-grid gap-3 mb-3" style="grid-template-columns: 1fr 1fr;">
                    <div class="form-group">
                        <label class="form-label fw-semibold">Department *</label>
                        <select name="department" class="form-control" required style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md); background: #fff;">
                            <option value="">Select Department</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="Electronics & Communication">Electronics & Communication</option>
                            <option value="Electrical Engineering">Electrical Engineering</option>
                            <option value="Mechanical Engineering">Mechanical Engineering</option>
                            <option value="Civil Engineering">Civil Engineering</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label fw-semibold">Year of Study *</label>
                        <select name="year" class="form-control" required style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md); background: #fff;">
                            <option value="">Select Year</option>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                            <option value="4th Year">4th Year</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group mb-4">
                    <label class="form-label fw-semibold">Message / Cover Note (Optional)</label>
                    <textarea name="message" class="form-control" rows="3" placeholder="Why do you want to participate? Any special requirements?" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md); font-family: inherit;"></textarea>
                </div>
                
                <div class="d-flex justify-end gap-2 mt-4 pt-3 border-top">
                    <a href="{{ url_for('public.home') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i> Submit Registration</button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
