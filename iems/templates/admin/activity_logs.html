{% extends "admin/base.html" %}

{% block title %}Activity Logs{% endblock %}

{% block content %}
<div class="admin-table-card">
    <div class="admin-table-header">
        <h3 class="admin-table-title">System Activity Logs</h3>
    </div>
    <div class="table-responsive p-3">
        <table class="table">
            <thead>
                <tr>
                    <th>Action</th>
                    <th>User</th>
                    <th>Module</th>
                    <th>IP Address</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="5" class="text-center text-muted py-4">No logs found or feature under construction.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
